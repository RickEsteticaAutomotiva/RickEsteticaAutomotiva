# =====================================================
# docker-compose.prod.yml — Ambiente de Produção na EC2
# =====================================================

version: '3.8'

services:
  # -------------------------------------------------------
  # API — Rick Agendamento de Serviços
  # -------------------------------------------------------
  api:
    image: ${DOCKER_USERNAME}/rick-api:latest
    container_name: rick_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      AWS_REGION: us-east-1