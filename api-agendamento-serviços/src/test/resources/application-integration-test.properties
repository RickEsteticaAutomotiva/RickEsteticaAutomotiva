# =====================================================
# Profile exclusivo para testes de integração (IT)
# =====================================================

# H2 em memória — instância separada do profile "test" unitário
spring.datasource.url=jdbc:h2:mem:integrationdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate recria o schema a cada run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# NUNCA executar data.sql automaticamente
# O seed é feito exclusivamente via @Sql(reset-it.sql + seed-it.sql) nos testes
spring.sql.init.mode=never

# Desabilita console H2
spring.h2.console.enabled=false

# Swagger desabilitado em testes
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Porta aleatória para não conflitar com outras instâncias
server.port=0

# Context-path vazio: com @SpringBootTest(RANDOM_PORT) + @AutoConfigureMockMvc o MockMvc
# despacha direto ao DispatcherServlet, SEM passar pelo Tomcat, portanto o context-path
# do application.properties (/api) NÃO é aplicado automaticamente.
# Zeramos aqui para que BASE_PATH="" no AbstractIntegrationTest funcione corretamente.
server.servlet.context-path=/

# -------------------------------------------------------
# Spring Mail — stub local (não envia e-mails reais)
# -------------------------------------------------------
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# -------------------------------------------------------
# JWT
# -------------------------------------------------------
jwt.secret=dGVzdGUtc2VjcmV0LWtleS1wYXJhLWp1bml0LXRlc3Rlcy1kZS1pbnRlZ3JhY2Fv
jwt.validity=3600

# -------------------------------------------------------
# Google Calendar — valores dummy (bean mockado nos testes)
# -------------------------------------------------------
google.calendar.credentials.file=classpath:credentials-oauth.json
google.calendar.application.name=ApiAgendamentoServicesTest
google.calendar.scopes=https://www.googleapis.com/auth/calendar
google.calendar.timezone=America/Sao_Paulo
google.calendar.tokens.directory.path=tokens

