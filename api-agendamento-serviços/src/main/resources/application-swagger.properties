# Configuracoes do Swagger/OpenAPI (perfil swagger)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.url=/v3/api-docs

# Evita que a UI abra com a barra de URL vazia e tente /api-docs padrao
springdoc.swagger-ui.disable-swagger-default-url=true

# Nao expor endpoints de actuator na documentacao publica
springdoc.show-actuator=false

# Ordena os endpoints por metodo HTTP e os grupos por nome
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Expande as operacoes automaticamente (none | list | full)
springdoc.swagger-ui.doc-expansion=none
