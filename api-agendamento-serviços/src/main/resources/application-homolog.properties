# =====================================================
# Profile: homolog — MySQL ambiente de homologação
# Credenciais via variáveis de ambiente ou secrets do CI/CD
# =====================================================

# MySQL homolog
spring.datasource.url=jdbc:mysql://localhost:3306/rick_homolog?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_HOMOLOG_USERNAME:user_homolog}
spring.datasource.password=${DB_HOMOLOG_PASSWORD:senha_homolog}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'none' — schema gerenciado exclusivamente pelo Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# -----------------------------------------------------------
# Flyway — homolog
# Apenas migrations versionadas; sem seed de dados fictícios
# -----------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# Porta
server.port=8080

# Logs mais restritivos
logging.level.com.automotiva.estetica.rick=INFO
logging.level.org.springframework.web=WARN

# data.sql — desabilitado (schema gerenciado externamente)
spring.sql.init.mode=never

# H2 Console — desabilitado em homolog (usa MySQL)
spring.h2.console.enabled=false

# Proxy Reverso — confiar em headers X-Forwarded-* do proxy
server.tomcat.remoteip.remote-ip-header=X-Forwarded-For
server.tomcat.remoteip.protocol-header=X-Forwarded-Proto
server.tomcat.remoteip.port-header=X-Forwarded-Port
server.forward-headers-strategy=native

# Configurações de segurança
server.error.include-stacktrace=never
server.error.include-message=never

# CORS em homolog — usar variável de ambiente (padrão: proxy filtra)
# Exemplo: ALLOWED_CORS_ORIGINS=https://app-homolog.example.com,https://admin-homolog.example.com
security.cors.allowed-origins=${ALLOWED_CORS_ORIGINS:}
security.cors.allow-credentials=true

