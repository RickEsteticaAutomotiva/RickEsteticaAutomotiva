# =====================================================
# Profile: dev — MySQL local
# =====================================================

# =====================================================
# SECRETS MANAGEMENT — Via .env.local ou Variáveis de Ambiente
# =====================================================
# DEV: Carrega de .env.local (gitignored) ou variáveis de ambiente explícitas
# Pré-requisito: container Docker rodando (docker/docker-compose.yml)
#   docker compose -f docker/docker-compose.yml up -d mysql

# MySQL local — credenciais devem vir de ENV VAR/.env.local
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rick_dev?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:rick}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool HikariCP (padrão Spring Boot) — ajuste fino para dev
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'none' — schema gerenciado exclusivamente pelo Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -----------------------------------------------------------
# Flyway — dev
# locations: migração principal + seed com dados fictícios
# -----------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/seed
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# Porta
server.port=8080

# Logs
logging.level.com.automotiva.estetica.rick=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# data.sql — desabilitado (schema e dados gerenciados pelo Flyway)
spring.sql.init.mode=never

# H2 Console — habilitado apenas em dev
spring.h2.console.enabled=true

# CORS em dev — permite todas as origens (seguro em dev; proxy filtra em prod)
security.cors.allowed-origins=*
security.cors.allow-credentials=false

# =====================================================
# RabbitMQ — dev
# Pré-requisito: container Docker rodando
#   docker compose -f docker/docker-compose.yml up -d rabbitmq
# Credenciais: admin / 123456 (conforme docker-compose.yml)
# =====================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.connection-timeout=10000

# =====================================================
# Redis — dev (cache distribuído)
# Pré-requisito: container Docker rodando
#   docker compose -f docker/docker-compose.yml up -d redis
# Password: redis@dev2024 (conforme docker-compose.yml)
# =====================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:redis@dev2024}
spring.data.redis.timeout=60000
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
