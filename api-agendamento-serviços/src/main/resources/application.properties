spring.application.name=api-agendamento-servicos
spring.profiles.active=dev,swagger

# Spring Cloud Config desabilitado; secrets via env vars/.env.local
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Carrega .env.local em dev local (arquivo gitignored)
# Hint [.properties] é necessário para arquivos sem extensão conhecida
spring.config.import=optional:file:./.env.local[.properties]

# =====================================================
# SECRETS MANAGEMENT — Variáveis de Ambiente Obrigatórias
# =====================================================
# Todos os valores sensíveis vêm de:
# 1. Variáveis de ambiente do SO (precedência máxima)
# 2. Arquivo .env.local (DEV apenas, gitignored)
# 3. AWS Secrets Manager / Kubernetes Secrets (PROD)
# 
# OWASP A02: Cryptographic Failures — SEM hardcoding de secrets
# =====================================================

# =====================================================
# CONFIGURAÇÕES PÚBLICAS (sem segredos)
# =====================================================

# Servidor
server.port=8080
server.servlet.context-path=/api


# Email: host e porta públicos; credenciais obrigatórias via ${ENV_VAR}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT: secret obrigatório via ${ENV_VAR}
jwt.secret=${JWT_SECRET}
jwt.validity=3600

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# =====================================================
# Redis — Cache distribuído
# =====================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=60000
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

