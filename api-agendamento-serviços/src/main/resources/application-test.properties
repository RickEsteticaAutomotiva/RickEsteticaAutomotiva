# =====================================================
# Spring Cloud Config — Secrets Management
# =====================================================
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false
# Sem import de arquivo de secrets local: testes usam stubs próprios neste profile

# H2 para testes — explicitamente declarado para não herdar config de outros profiles
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA para testes
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Nao executar data.sql em testes (evita erros de tabela nao encontrada)
spring.sql.init.mode=never

# Flyway desabilitado nos testes unitários:
# schema criado pelo ddl-auto=create-drop (mais rápido, sem migrations)
spring.flyway.enabled=false

# Desabilitar console H2 em testes
spring.h2.console.enabled=false

# Porta diferente para testes
server.port=8080

springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Spring Mail (stub para testes - nao envia emails reais)
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT
jwt.secret=dGVzdGUtc2VjcmV0LWtleS1wYXJhLWp1bml0LXRlc3Rlcy1kZS1pbnRlZ3JhY2Fv
jwt.validity=3600

# =====================================================
# Redis — testes desabilitam cache real, usam noop
# =====================================================
spring.cache.type=none
