# =====================================================
# Profile: prod — MySQL produção
# TODAS as credenciais OBRIGATORIAMENTE via variáveis de ambiente
# Nunca hardcode de senhas em produção!
# Exemplo de DB_URL:
#   jdbc:mysql://db-host:3306/rick_prod?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo&useSSL=true
# =====================================================

# MySQL produção — variáveis de ambiente obrigatórias
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool HikariCP — configuração robusta para produção
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# JPA — NUNCA usar create-drop ou update em produção!
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# -----------------------------------------------------------
# Flyway — prod
# baseline-on-migrate=false em prod: o banco DEVE ser limpo ou
# já ter sido migrado antes. Sem seed de dados fictícios.
# -----------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true

# Porta
server.port=8080

# Logs apenas erros
logging.level.com.automotiva.estetica.rick=WARN
logging.level.org.springframework.web=ERROR

# Desabilitar console H2 (não existe em prod)
spring.h2.console.enabled=false

# Configurações de segurança
server.error.include-stacktrace=never
server.error.include-message=never

# data.sql — nunca executar em produção
spring.sql.init.mode=never

