# =====================================================
# Profile: prod
# TODOS OS SECRETS OBRIGATORIAMENTE VIA SSM (AWS Parameter Store)
# =====================================================

spring.config.import=aws-parameterstore:/rick-estetica/prod/

# MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_DATABASE}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo&useSSL=false
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# JPA
spring.jpa.hibernate.ddl-auto=none

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true

# Porta
server.port=8080

# CORS
security.cors.allowed-origins=${ALLOWED_CORS_ORIGINS}
security.cors.allow-credentials=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Mail
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# JWT
jwt.secret=${jwt.secret}
jwt.validity=7200

spring.sql.init.mode=never
