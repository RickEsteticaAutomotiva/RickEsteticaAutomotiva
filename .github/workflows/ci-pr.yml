name: PR Build

on:
  pull_request:
    branches:
      - main
      - dev
      - feature/docker

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SPRING_PROFILES_ACTIVE: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test
        run: mvnw clean verify

