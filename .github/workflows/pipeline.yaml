name: Backend CI/CD

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/rick-api

jobs:
  build-and-push:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verificar espaço em disco
        run: |
          df -h /
          docker system df

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build e Push image
        working-directory: api-agendamento-serviços
        run: |
          docker build \
            --progress=plain \
            --build-arg GH_USERNAME=${{ secrets.GH_USERNAME }} \
            --build-arg GH_TOKEN=${{ secrets.GH_TOKEN }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Limpar imagens e cache antigos
        if: always()
        run: |
          docker image prune -f
          docker builder prune -f --filter "until=48h"
          df -h /

  deploy:
    needs: build-and-push
    defaults:
      run:
        working-directory: api-agendamento-serviços
    strategy:
      matrix:
        runner: [backend-rea-1, backend-rea-2]
      max-parallel: 1
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Buscar variáveis do SSM
        run: |
          aws ssm get-parameters-by-path \
            --path "/rick-estetica/prod" \
            --with-decryption \
            --query "Parameters[*].[Name,Value]" \
            --output text | while read name value; do
              var=$(basename "$name")
              echo "$var=$value"
            done > .env

          echo "=== Variáveis carregadas ==="
          cat .env

      - name: Deploy
        working-directory: api-agendamento-serviços
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose -f docker-compose.prod.yml pull
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose -f docker-compose.prod.yml up -d

      - name: Limpar imagens antigas no deploy
        if: always()
        run: docker image prune -f
