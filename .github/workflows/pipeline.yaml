name: Backend CI/CD

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configurar Maven com GitHub Packages
        working-directory: api-agendamento-serviços
        run: |
            mkdir -p ~/.m2
            echo "<settings>
            <servers>
                <server>
                <id>github</id>
                <username>${{ secrets.GH_USERNAME }}</username>
                <password>${{ secrets.GH_TOKEN }}</password>
                </server>
            </servers>
            </settings>" > ~/.m2/settings.xml

      - name: Rodar testes
        working-directory: api-agendamento-serviços
        run: |
          chmod +x mvnw
      #    ./mvnw test -B

      - name: Build e Push image
        working-directory: api-agendamento-serviços
        run: |
            docker build -t ${{ secrets.DOCKER_USERNAME }}/rick-api:latest .
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker push ${{ secrets.DOCKER_USERNAME }}/rick-api:latest

  deploy:
    needs: build-and-push
    strategy:
      matrix:
        runner: [rea-backend-1, rea-backend-2]
      max-parallel: 1
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Buscar variáveis do SSM
        run: |
          aws ssm get-parameters-by-path \
            --path "/rick-estetica/prod" \
            --with-decryption \
            --query "Parameters[*].[Name,Value]" \
            --output text | while read name value; do
              var=$(basename "$name")
              echo "$var=$value"
            done > .env

      - name: Deploy
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d